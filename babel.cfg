# Règles d'extraction des chaînes traduisibles (pybabel extract -F babel.cfg).
# Couvre le code Python (gettext/lazy_gettext/ngettext/pgettext) et les templates Jinja2
# ({% trans %}, {{ _() }}). Les chaînes JS sont récoltées via transcria/web/i18n_js.py
# (appels gettext côté Python) — pas de scan .js séparé.
[python: transcria/**.py]
[python: app.py]

[jinja2: transcria/web/templates/**.html]
extensions=jinja2.ext.i18n
