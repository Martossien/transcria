server:
  host: "0.0.0.0"
  port: 7870
  debug: true

storage:
  jobs_dir: "./jobs"
  database_url: "sqlite:///transcrIA.db"

auth:
  enabled: true
  first_admin_username: "admin"
  first_admin_password: "CHANGE-ME"

services:
  dashboard_llm_url: "http://127.0.0.1:5001"
  srt_editor_easy_url: "http://127.0.0.1:7861"
  arbitrage_script: "./scripts/launch_arbitrage.sh"
  stop_script: "./scripts/stop_arbitrage_llm.sh"
  arbitrage_llm_port: 8080
  # Ports de backends LLM concurrents à libérer avant de lancer la LLM d'arbitrage
  # Exemples: vLLM, SGLang, llama.cpp, ik_llama.cpp exposés sur un autre port
  llm_cleanup_ports:
    - 8000
  # model_id tel que rapporté par /v1/models (alias du backend OpenAI-compatible)
  # utilisé par ensure_arbitrage_llm_ready() pour éviter un redémarrage inutile
  # lancer scripts/check_arbitrage_llm.sh pour obtenir la valeur exacte
  # arbitrage_api_model_id: "votre-modele-llm-ici"

models:
  stt_backend: "cohere"
  default_stt_model: "cohere-transcribe-03-2026"
  fallback_stt_model: "large-v3"
  cohere_model_path: "./models/cohere-asr/cohere-transcribe-03-2026"
  pyannote_model: "pyannote/speaker-diarization-community-1"

whisper:
  # Backend qualité/fallback. Cohere reste le backend normal du workflow.
  model_size: "large-v3"
  compute_type: "float16"
  cpu_threads: 4
  chunk_length_s: 30
  beam_size: 5
  best_of: 5
  vad_filter: true
  word_timestamps: true
  condition_on_previous_text: false
  no_speech_threshold: 0.2
  compression_ratio_threshold: 2.0
  log_prob_threshold: -1.0
  hallucination_silence_threshold: 3.0
  repetition_penalty: 1.0
  no_repeat_ngram_size: 0
  suppress_numerals: false
  hotwords:
  initial_prompt:
  collapse_repetition_loops: true
  repetition_loop_min_repeats: 4
  repetition_loop_max_phrase_words: 10
  repetition_loop_keep_repeats: 2
  forced_alignment:
    # Alignement CTC natif optionnel ; désactivé par défaut pour éviter un téléchargement de modèle non demandé.
    enabled: false
    backend: "torchaudio_ctc"
    bundle_name: "VOXPOPULI_ASR_BASE_10K_FR"
    max_segment_s: 30.0

gpu:
  cohere_vram_mb: 6000
  pyannote_vram_mb: 2000
  llm_vram_mb: 60000
  min_free_vram_mb: 4000

workflow:
  enable_quick_summary: true
  enable_speaker_detection: true
  enable_quality_mode: true
  enable_external_srt_editor_link: true
  enable_vad: true
  audio_quality:
    force_quality_backend: true
    degraded_levels:
      - "degrade"
    suspect_levels:
      - "suspect"
    min_bit_rate: 64000
    min_sample_rate_hz: 16000
    max_non_latin_segments: 2
    max_short_segment_ratio: 0.2
    min_speech_ratio: 0.35
    max_speech_ratio: 0.95
    scene_affects_quality_score: false  # audit seulement par défaut, pas de forçage backend
    max_scene_music_ratio: 0.15
    max_scene_noise_ratio: 0.20
    max_scene_no_energy_ratio: 0.30
    min_scene_speech_ratio: 0.55
    max_scene_problem_segments: 3
  quality_transcription:
    # Le mode qualité utilise Whisper large-v3 optimisé ; le mode rapide garde models.stt_backend sauf diagnostic dégradé.
    force_stt_backend: "whisper"
    enabled_for_modes:
      - "quality"
    force_on_degraded_summary: true
    degraded_summary_levels:
      - "degrade"
  vad:
    enabled_summary: true
    enabled_final: false
    adaptive: true
    threshold: 0.5
    threshold_low_quality: 0.35
    threshold_high_noise: 0.6
    min_speech_duration_ms: 250
    min_silence_duration_ms: 400
    min_silence_duration_ms_low_quality: 250
    speech_pad_ms: 200
    speech_pad_ms_low_quality: 350
  audio_scene:
    # Analyse acoustique de scène en subprocess isolé (librosa — aucune dépendance GPU).
    # Produit : ratios parole/non-parole, segments horodatés, distribution H/F.
    # Quand enabled: true, SourceSeparationDecider priorise ces signaux sur le score.
    enabled: false
    timeout_s: 120            # durée maximale allouée au subprocess (secondes)
    detect_gender: true       # sous-classification speech → male / female via pitch (YIN)
    thresholds:
      energy_ratio: 0.03      # fraction de l'énergie RMS moyenne → inactivité
      min_segment_s: 0.3      # segments plus courts ignorés
      noise_flatness_min: 0.40  # spectral flatness > seuil → bruit
      music_flatness_max: 0.12  # flatness < seuil ET ZCR < zcr_max → musique
      music_zcr_max: 0.10
      female_pitch_hz: 165.0  # pitch médian ≥ seuil → voix féminine
      problem_segment_min_s: 2.0  # zone non vocale minimale exposée à la relecture
  audio_scene_filter:
    # Option qualité expérimentale : met en silence les zones non vocales longues
    # sans couper l'audio, afin de préserver les timestamps du SRT.
    enabled: false
    enabled_for_modes:
      - "quality"
    target_labels:
      - "music"
      - "noise"
    min_segment_s: 2.0
    min_total_muted_s: 2.0
    edge_keep_s: 0.15
    max_intervals: 100
    timeout_s: 300
  source_separation:
    # Séparation de sources vocales via Demucs (pip install demucs).
    # Ne s'active JAMAIS automatiquement : c'est SourceSeparationDecider qui
    # décide, sur la base de audio_quality_decision.json et audio_scene, si la
    # séparation est susceptible d'améliorer la qualité STT pour ce job.
    enabled: false
    backend: "demucs"
    model: "htdemucs"         # htdemucs (défaut) | htdemucs_ft (fine-tuned, plus lent)
    device: "auto"            # auto | cpu | cuda | cuda:0 | cuda:1
    segment_s: 10             # secondes de traitement par batch (mémoire vs qualité)
    stem: "vocals"            # tige à extraire : vocals | drums | bass | other
    decision:
      min_score: 3            # seuil de score pour activer la séparation
      min_duration_s: 60      # audio < 60s → séparation non déclenchée (surcoût injustifié)
      scene_music_min_ratio: 0.05       # musique suffisante pour forcer la séparation
      scene_music_min_duration_s: 10    # ou durée musique minimale en secondes
      scene_noise_score_ratio: 0.35     # bruit important → ajoute un score, ne force pas seul
      scene_noise_score: 1
      scene_problem_segments_score_threshold: 3
      scene_problem_segments_score: 1
  speaker_realignment:
    enabled: true
    min_word_overlap_s: 0.01
    punctuation_chars: ".,;:!?)]}»"
  execution:
    max_concurrent_jobs: 1
  summary_llm:
    enabled: true
    model_id: "local/votre-modele-llm-ici"
    api_base: "http://127.0.0.1:8080/v1"
    timeout_seconds: 1800
  arbitration_llm:
    enabled: false
    model_id: "local/votre-modele-llm-ici"
    api_base: "http://127.0.0.1:8080/v1"
    timeout_seconds: 7200
    opencode_bin: "opencode"

quality:
  asr_noise_markers:
    - "thank you"
    - "thanks"
    - "gracias"
    - "obrigado"
    - "e aí"
    - "come on"
    - "absolutely"
    - "hollywood"

diarization:
  cache_enabled: true
  cache_audio_fingerprint: true
  embedding_cache_enabled: true
  embedding_clip_seconds: 12.0

security:
  retention_days: 365
  allow_job_delete: true
  max_upload_size_mb: 1024
  allowed_upload_extensions:
    - ".mp3"
    - ".wav"
    - ".m4a"
    - ".mp4"
    - ".flac"
    - ".ogg"
