server:
  host: "0.0.0.0"
  port: 7870
  # debug: true active le débogueur Werkzeug (rechargement + console interactive).
  # À NE JAMAIS laisser à true en production (exécution de code à distance).
  # Laisser false par défaut ; surchargeable via TRANSCRIA_DEBUG pour le dev local.
  debug: false

runtime:
  # Rôle du process (Phase B / montée en charge) :
  #   all       : tout-en-un mono-process (défaut, dev et petits déploiements) ;
  #   web       : tier HTTP sans état (gunicorn -w N) — n'exécute PAS la file ;
  #   scheduler : orchestrateur unique qui draine la file et exécute les jobs.
  # Surchargé par la variable d'environnement TRANSCRIA_ROLE. En distribué, lancer
  # un (et un seul) process 'scheduler' + N process 'web' (verrou consultatif PG en garde-fou).
  role: "all"

storage:
  jobs_dir: "./jobs"
  # Base de données. SQLite convient au dev/poste isolé. En production, préférez
  # PostgreSQL (meilleure tenue à la charge concurrente).
  #   database_url: "postgresql+psycopg://transcria:MOT_DE_PASSE@127.0.0.1:5432/transcria"
  # Le DSN peut (et devrait, pour ne pas versionner le mot de passe) être fourni via
  # la variable d'environnement TRANSCRIA_DATABASE_URL, prioritaire sur cette valeur.
  # Le schéma est géré par Alembic (`alembic upgrade head`, lancé par start.sh).
  database_url: "sqlite:///transcrIA.db"
  # Stockage des fichiers de jobs entre tiers (docs/STOCKAGE_PARTAGE_JOBS.md) :
  #   fs (défaut) : disque local — tout-en-un, ou split avec jobs_dir partagé (NFS).
  #   pg : fichiers répliqués via PostgreSQL — REQUIS quand la frontale (role=web) et le
  #        worker (role=scheduler) tournent sur deux machines SANS filesystem commun.
  shared_backend: "fs"

voice_enrollment:
  # Reconnaissance vocale des locuteurs (donnée biométrique). N'expose que des
  # endpoints/écrans gatés : rien ne s'exécute sans action opérateur. Le recueil du
  # consentement (RGPD) reste obligatoire — voir consent.* ci-dessous.
  enabled: true
  storage_dir: "./voices"
  require_active_consent: true
  delete_source_audio_after_embedding: true
  allow_global_profiles: false
  require_explicit_job_group_for_multi_group_users: true
  embedding:
    backend: "pyannote"
    model_id: "pyannote/speaker-diarization-community-1"
    model_revision: ""
    expected_dim:
    normalization: "l2"
    min_speech_duration_s: 8.0
    min_segment_duration_s: 1.5
    max_segments_per_speaker: 5
    exclude_overlap: true
  matching:
    enabled_after_summary: true
    suggestion_threshold: 0.75
    high_confidence_threshold: 0.85
    min_top2_margin: 0.08
    max_candidates_per_speaker: 2
    stale_profiles_are_matchable: false
  consent:
    current_form_version: "voice-consent-v1"
    allow_expiration: false
    validity_days:
    proof_allowed_extensions:
      - "pdf"
      - "png"
      - "jpg"
      - "jpeg"
    max_proof_size_mb: 25
  audit:
    log_match_suggestions: true
    log_match_scores: true

auth:
  enabled: true
  first_admin_username: "admin"
  first_admin_password: "CHANGE-ME"

services:
  # Backend de la LLM d'arbitrage. Absent/omis = auto-détection rétro-compatible
  # (ollama_url ⇒ ollama, arbitrage_script ⇒ llama.cpp/vLLM, sinon http distant).
  #   - "script"  : llama.cpp / vLLM lancés par arbitrage_script (contrôle/multi-GPU).
  #   - "ollama"  : démon Ollama (facile, sans compilation) ; voir ollama_url / ollama_model.
  #   - "http"    : serveur OpenAI externe déjà en place (api_base ci-dessous).
  # backend: "script"
  # Backend Ollama (scope all-in-one) : le cycle de vie = charger/décharger le modèle en
  # VRAM (jamais tuer le démon). ollama_model = nom NATIF du registre (le model_id opencode
  # reste "local/<modèle>"). L'endpoint suit ollama_url (défaut 11434) via la source unique.
  # VRAM par carte (poids + KV-cache contexte 256K, mono-carte) : qwen3.5:9b ≈ 14,7 Go
  # (tient sur 16 Go, pas 12) ; 12 Go → qwen3.5:4b ; 32 Go → qwen3.6:27b ; 48 Go+ → qwen3.6:35b.
  # RÉSUMÉ (summary_llm) et CORRECTION (arbitration_llm) utilisent le MÊME modèle Ollama
  # (une seule instance résidente réutilisée — pas de double chargement VRAM).
  # ollama_url: "http://127.0.0.1:11434"
  # ollama_model: "qwen3.5:9b"
  arbitrage_script: "./scripts/launch_arbitrage.sh"
  stop_script: "./scripts/stop_arbitrage_llm.sh"
  # Fichier où est capturée la sortie du script de lancement (stdout+stderr).
  # Indispensable pour diagnostiquer une LLM qui ne démarre pas (binaire introuvable,
  # OOM GPU, tensor-split incompatible…). Vide = /tmp/arbitrage_llm_<port>.log
  arbitrage_log_path: ""
  arbitrage_llm_port: 8080
  # Ports de backends LLM concurrents à libérer avant de lancer la LLM d'arbitrage
  # Exemples: vLLM, SGLang, llama.cpp, ik_llama.cpp exposés sur un autre port
  llm_cleanup_ports:
    - 8000
  # model_id tel que rapporté par /v1/models (alias du backend OpenAI-compatible)
  # utilisé par ensure_arbitrage_llm_ready() pour éviter un redémarrage inutile.
  # Par convention on fixe l'alias générique `arbitrage` (--alias arbitrage dans le
  # script de lancement) afin qu'il ne change jamais selon le palier VRAM.
  # lancer scripts/check_arbitrage_llm.sh pour confirmer la valeur exacte servie.
  # arbitrage_api_model_id: "arbitrage"

models:
  # Défauts PROD (qualité de référence, modèles gated → token HF requis). NB : le quickstart
  # Docker all-in-one bascule sur les défauts NON gated (stt_backend "whisper" +
  # diarization_backend "sortformer") quand HF_TOKEN est absent → test sans token (cf. docs/DOCKER.md).
  stt_backend: "cohere"
  diarization_backend: "pyannote"   # "pyannote" (défaut, illimité, gated) ou "sortformer" (≤4 loc., non gated)
  default_stt_model: "cohere-transcribe-03-2026"
  fallback_stt_model: "large-v3"
  # Chemin du modèle Cohere ASR, passé tel quel à transformers `from_pretrained`.
  # Deux formes acceptées :
  #   - identifiant de dépôt HuggingFace (recommandé) : résolu via le cache HF et
  #     téléchargé automatiquement au premier usage (`huggingface-cli download` possible) ;
  #   - chemin local (ex. "./models/cohere-asr/cohere-transcribe-03-2026") si le modèle
  #     a été pré-téléchargé sur disque — installé via install.sh.
  cohere_model_path: "CohereLabs/cohere-transcribe-03-2026"
  # Optionnel : commit/snapshot HF à pinner si le cache local `refs/main` est incomplet.
  cohere_model_revision: ""
  pyannote_model: "pyannote/speaker-diarization-community-1"

cohere:
  # Backend principal recommandé en production à ce stade.
  chunk_length_s: 30
  max_new_tokens: 448
  punctuation: true
  repetition_penalty: 1.2
  no_repeat_ngram_size: 4
  collapse_repetition_loops: true
  repetition_loop_min_repeats: 4
  repetition_loop_max_phrase_words: 10
  repetition_loop_keep_repeats: 2
  lexicon_biasing:
    # Expérimental : biasing contextuel par Trie sur les termes validés du lexique de session.
    # Désactivé par défaut ; à benchmarker par domaine avant activation production.
    enabled: false
    priorities: ["critique", "importante", "normale"]
    max_terms: 300
    boost: 0.2
    start_boost: 0.05
    max_prefix_tokens: 20

cohere_tf5:
  # Backend expérimental opt-in (`models.stt_backend: "cohere_tf5"`).
  # Utilise la classe native Transformers 5, installée de préférence dans un
  # répertoire isolé (`pip --target`) pour ne pas casser NeMo/datasets/lightning.
  enabled: false
  tf5_site: "/tmp/transcria_tf54_site"
  model_path: "CohereLabs/cohere-transcribe-03-2026"
  model_revision: ""
  timeout_s: 7200
  chunk_length_s: 30
  max_new_tokens: 448
  punctuation: true
  batch_size: 96
  repetition_penalty: 1.2
  no_repeat_ngram_size: 4
  collapse_repetition_loops: true
  repetition_loop_min_repeats: 4
  repetition_loop_max_phrase_words: 10
  repetition_loop_keep_repeats: 2

whisper:
  # Backend qualité/fallback. Cohere reste le backend normal du workflow.
  model_size: "large-v3"
  compute_type: "float16"
  cpu_threads: 4
  chunk_length_s: 30
  beam_size: 5
  best_of: 5
  vad_filter: false
  word_timestamps: true
  condition_on_previous_text: false
  no_speech_threshold: 0.2
  compression_ratio_threshold: 2.0
  log_prob_threshold: -1.0
  hallucination_silence_threshold: 3.0
  repetition_penalty: 1.0
  no_repeat_ngram_size: 0
  suppress_numerals: false
  hotwords:
  initial_prompt:
  lexicon_hotwords:
    # Expérimental : injecte les termes critiques/importants du lexique de session dans les hotwords Whisper.
    # Désactivé par défaut car Whisper n'est pas systématiquement meilleur et le biasing doit rester mesuré.
    enabled: false
    priorities: ["critique", "importante"]
    max_terms: 50
    max_chars: 900
    max_tokens: 200
    tokenizer_model: "openai/whisper-large-v3"
    prefix: "Termes importants :"
  collapse_repetition_loops: true
  repetition_loop_min_repeats: 4
  repetition_loop_max_phrase_words: 10
  repetition_loop_keep_repeats: 2
  forced_alignment:
    # Alignement CTC natif optionnel ; désactivé par défaut pour éviter un téléchargement de modèle non demandé.
    enabled: false
    backend: "torchaudio_ctc"
    bundle_name: "VOXPOPULI_ASR_BASE_10K_FR"
    max_segment_s: 30.0

granite:
  # Backend STT expérimental IBM Granite Speech 4.1 2B.
  # Désactivé par défaut : Cohere reste le backend production normal.
  enabled: false
  model_id: "./models/granite-speech-4.1-2b"
  torch_dtype: "bfloat16"
  chunk_length_s: 300
  max_new_tokens: 2000
  max_new_tokens_per_second: 8.0
  min_new_tokens: 64
  prompt_mode: "asr_punctuated"
  prompt_asr_raw: "<|audio|>can you transcribe the speech into a written format?"
  prompt_asr_punctuated: "<|audio|>transcribe the speech with proper punctuation and capitalization."
  prompt_keywords: "<|audio|>transcribe the speech to text. Keywords: {keywords}"
  keywords: []
  fix_mistral_regex: true
  collapse_repetition_loops: true
  repetition_loop_min_repeats: 4
  repetition_loop_max_phrase_words: 10
  repetition_loop_keep_repeats: 2

sortformer:
  # Backend de diarisation experimental NVIDIA Sortformer 4spk v2.1 via NeMo.
  # Language-agnostic (embeddings acoustiques), max 4 locuteurs, CC-BY-4.0.
  # Activer via models.diarization_backend: "sortformer".
  # Pyannote reste le backend de diarisation par defaut (pas de limite locuteurs).
  model_id: "nvidia/diar_streaming_sortformer_4spk-v2.1"
  vram_mb: 3500

parakeet:
  # Backend STT experimental NVIDIA Parakeet TDT 0.6B v3 via NeMo.
  # 25 langues europeennes, auto-detection, ponctuation native, timestamps.
  # Desactive par defaut : Cohere reste le backend production normal.
  # Limites connues : pas de word boosting, ITN FR peut ecrire les nombres en lettres.
  enabled: false
  model_id: "nvidia/parakeet-tdt-0.6b-v3"
  use_local_attention: true
  att_context_size: [256, 256]
  decoding_strategy: "greedy_batch"  # beam casse les timestamps dans NeMo 2.7.3, greedy risque HF#12
  decoding_beam_size: 2
  max_chunk_duration_s: 1200       # pre-chunking > 20 min pour eviter OOM (HF#41)
  collapse_repetition_loops: true
  repetition_loop_min_repeats: 4
  repetition_loop_max_phrase_words: 10
  repetition_loop_keep_repeats: 2

gpu:
  cohere_vram_mb: 6000
  pyannote_vram_mb: 2000
  # Empreinte TOTALE de la LLM d'arbitrage (tous GPU confondus). La LLM est un moteur
  # MULTI-GPU : son placement est décidé par le script de lancement (CUDA_VISIBLE_DEVICES
  # + --tensor-split). Déclarez ici les cartes qu'il utilise — la vérification/réservation
  # se fait PAR GPU (total ÷ nb de cartes). llm_gpu_indices absent = tous les GPU visibles.
  llm_vram_mb: 60000
  # llm_gpu_indices: [0, 1, 2]
  # Cartes HÉTÉROGÈNES (8/12/16/24/48 Go…) ou --tensor-split inégal : part réelle par
  # carte, alignée sur llm_gpu_indices (ex. [18000, 6000] pour 24+8 Go). Absent = égal.
  # llm_vram_mb_per_gpu: [20000, 20000, 20000]
  granite_vram_mb: 6000
  parakeet_vram_mb: 8000
  sortformer_vram_mb: 3500
  # Marge libre exigée PAR GPU en plus du besoin d'une phase. À RÉDUIRE sur les
  # petites cartes (4-8 Go) : 4000 y interdirait presque toute allocation.
  min_free_vram_mb: 4000

workflow:
  enable_quick_summary: true
  enable_speaker_detection: true
  enable_quality_mode: true
  enable_vad: true
  progress:
    enabled: true
    update_interval_s: 10.0
  audio_quality:
    force_quality_backend: true
    degraded_levels:
      - "degrade"
    suspect_levels:
      - "suspect"
    min_bit_rate: 64000
    min_sample_rate_hz: 16000
    max_non_latin_segments: 2
    max_short_segment_ratio: 0.2
    min_speech_ratio: 0.35
    max_speech_ratio: 0.95
    scene_affects_quality_score: false  # audit seulement par défaut, pas de forçage backend
    max_scene_music_ratio: 0.15
    max_scene_noise_ratio: 0.20
    max_scene_no_energy_ratio: 0.30
    min_scene_speech_ratio: 0.55
    max_scene_problem_segments: 3
  quality_transcription:
    # Le mode "quality" active le workflow complet, mais ne force plus Whisper par défaut.
    # Cohere reste le backend principal ; définir force_stt_backend: "whisper" + enabled_for_modes
    # seulement pour des campagnes ciblées ou des environnements qui le justifient.
    force_stt_backend:
    enabled_for_modes: []
    force_on_degraded_summary: false
    degraded_summary_levels:
      - "degrade"
  audio_preflight:
    # Diagnostic acoustique déterministe pré-STT. Il ne modifie jamais l'audio ;
    # il produit metadata/audio_preflight.json pour logs, audit qualité et décisions futures.
    enabled: true
    frame_ms: 30
    low_rms_threshold: 0.02
    very_low_rms_threshold: 0.008
    silence_rms_threshold: 0.003
    low_snr_db_threshold: 6.0
    narrowband_hz_threshold: 3800.0
    clipping_threshold: 0.98
    clipping_ratio_threshold: 0.001
    # Qualification SQUIM (STOI/PESQ/SI-SDR). Le score global est borné : il échantillonne
    # quelques fenêtres réparties puis moyenne (jamais le fichier entier → pas d'OOM long).
    squim:
      enabled: true
      segment_s: 5.0
      hop_s: 2.5                # pas de la frise sur GPU (pleine résolution)
      hop_s_cpu: 5.0            # pas élargi en repli CPU (≈÷2 fenêtres → vitesse)
      device: "auto"            # auto = GPU le PLUS libre (≥ vram_mb), sinon CPU ; contourne le GPU du LLM sans le tuer
      vram_mb: 5000             # VRAM requise pour placer SQUIM sur un GPU (≈4,8 Go + marge)
      stoi_threshold: 0.70
      pesq_threshold: 2.5
      sisdr_threshold: 5.0
      difficulty_map_always: false   # true = calcule la difficulty_map même sur audio "ok" (bench)
    # Qualification perceptive DNSMOS P.835 (SIG/BAK/OVRL). Indépendante de SQUIM
    # (sondes bornées) ; reste disponible même si SQUIM échoue. Inférence ONNX CPU.
    dnsmos:
      enabled: true
      ovrl_threshold: 2.5
      sig_bak_margin: 0.0
    # Métriques acoustiques par fenêtre (RT60/C50/SNR/codec, numpy/scipy CPU).
    acoustic:
      enabled: true
      rt60_threshold: 0.6
      snr_threshold: 6.0
      c50_threshold: -5.0
  segment_reliability:
    # Ajoute reliability=ok|suspect|degrade sur chaque segment ASR.
    # Ce score ne supprime rien ; il sert au rapport qualité et aux futures protections LLM.
    enabled: true
    no_speech_prob_threshold: 0.5
    low_word_confidence_ratio: 0.5
    low_word_confidence_min: 0.4
    micro_segment_s: 0.35
    short_segment_s: 0.8
    # Flags textuels configurables. Aucun terme métier n'est codé en dur :
    # ajoutez ici vos regex si des hallucinations génériques récurrentes sont observées.
    detect_non_latin: true
    non_latin_char_pattern: "[\\u0400-\\u04FF\\u0600-\\u06FF\\u0750-\\u077F\\u4E00-\\u9FFF\\u3040-\\u30FF\\uAC00-\\uD7AF]"
    non_latin_min_chars: 2
    detect_generic_hallucinations: true
    generic_hallucination_patterns:
      # Signatures génériques connues d'hallucinations ASR/Whisper sur silence, bruit,
      # artefacts vidéo ou corpus sous-titrés. Liste configurable : retirer/ajouter selon vos audios.
      - "\\bpour plus d['’]informations\\b"
      - "\\babonnez[- ]?vous\\b"
      - "\\bcontactez[- ]?nous\\b"
      - "\\bsite web\\b"
      - "\\bregard[ée] cette vid[ée]o\\b"
      - "\\bsous[- ]?titrage\\b"
      - "\\bradio[- ]?canada\\b"
      - "\\buniversit[eé] d['’]ottawa\\b"
      # Artefacts anglais courts observés sur audio français faible ou étroit
      # avec certains backends STT génératifs.
      - "^\\s*thank\\s+you\\s*[.!?…]*\\s*$"
      - "^\\s*thank\\s+you\\s+very\\s+much\\s*[.!?…]*\\s*$"
      - "^\\s*thanks\\s*[.!?…]*\\s*$"
    degrade_on_text_flags: true
  pyannote_chunking:
    # Post-traitement conservateur des tours pyannote avant STT.
    # Objectif : réduire les micro-chunks sans perdre les interjections utiles.
    merge_micro_chunks: true
    micro_chunk_s: 0.35
    micro_chunk_neighbor_gap_s: 0.4
    isolated_min_chunk_s: 0.3
    padding_s: 0.15
    max_chunk_s: 45
    min_chunk_s: 1.5
  vad:
    enabled_summary: true
    enabled_final: false
    auto_enable_final_on_degraded: false
    auto_enable_final_levels:
      - "degrade"
    hysteresis_enabled: false
    onset: 0.5
    offset: 0.35
    adaptive: true
    threshold: 0.5
    threshold_low_quality: 0.35
    threshold_high_noise: 0.6
    threshold_final_degraded: 0.6
    min_speech_duration_ms: 250
    min_silence_duration_ms: 400
    min_silence_duration_ms_low_quality: 250
    speech_pad_ms: 200
    speech_pad_ms_low_quality: 350
  transcription_cleanup:
    enabled: true
    remove_subtitle_artifacts: true
    remove_obvious_hallucinations: true
    remove_non_latin_hallucinations: true
    remove_generic_hallucinations: true
    non_latin_char_pattern: "[\\u0400-\\u04FF\\u0600-\\u06FF\\u0750-\\u077F\\u4E00-\\u9FFF\\u3040-\\u30FF\\uAC00-\\uD7AF]"
    non_latin_min_chars: 2
    non_latin_min_ratio: 0.25
    generic_hallucination_languages: ["fr"]
    generic_hallucination_patterns: []  # vide → défauts intégrés (thank you/bye isolés sur réunions FR)
    isolated_noise_artifact_words: ["501"]
    isolated_noise_artifact_max_s: 0.8
    merge_short_segments: true
    short_segment_max_s: 0.45
    short_segment_max_words: 2
    merge_gap_s: 0.5
    merge_max_chars: 220
    # Listes vides → défauts intégrés (marqueurs Radio-Canada/sous-titrage).
    # Listes non vides → remplacent entièrement les défauts.
    subtitle_artifact_patterns: []   # regex (ex. "\\bwatermark\\b")
    subtitle_artifact_words: []      # mots exacts normalisés (ex. "noise")
  stt_corpus:
    # Corpus de calibration difficulté↔qualité STT par segment. Pour chaque job,
    # écrit metadata/stt_corpus.json (difficulté jointe × moteur × fiabilité par
    # segment) et un agrégat compact dans extra_data.stt_corpus_summary (requêtable
    # cross-jobs). Coût négligeable ; sert à calibrer les seuils SQUIM/DNSMOS.
    enabled: true
  stt_hybrid:
    # Mode qualité Cohere→Whisper au segment. Désactivé tant qu'il reste en
    # prototype hors pipeline ; ne pas confondre avec inference.mode=hybrid.
    enabled: false
    primary_backend: cohere
    fallback_backend: whisper
    fallback_on_reliability: ["degrade"]
    review_on_reliability: ["suspect"]
    decision_margin: 3
    window_s: 30.0
    llm_arbitration_enabled: false
    write_audit_artifacts: true
  audio_scene:
    # Analyse acoustique de scène en subprocess isolé (librosa — aucune dépendance GPU).
    # Produit : ratios parole/non-parole, segments horodatés, distribution H/F.
    # Quand enabled: true, SourceSeparationDecider priorise ces signaux sur le score.
    # CPU uniquement (librosa, dépendance déjà installée) ; alimente le diagnostic audio.
    enabled: true
    timeout_s: 120            # durée maximale allouée au subprocess (secondes)
    detect_gender: true       # sous-classification speech → male / female via pitch (YIN)
    thresholds:
      energy_ratio: 0.03      # fraction de l'énergie RMS moyenne → inactivité
      min_segment_s: 0.3      # segments plus courts ignorés
      noise_flatness_min: 0.40  # spectral flatness > seuil → bruit
      music_flatness_max: 0.12  # flatness < seuil ET ZCR < zcr_max → musique
      music_zcr_max: 0.10
      music_suppress_bandwidth_hz: 3000.0  # bande passante médiane < seuil → musique neutralisée (parole bande étroite). 0 = désactivé
      female_pitch_hz: 165.0  # pitch médian ≥ seuil → voix féminine
      problem_segment_min_s: 2.0  # zone non vocale minimale exposée à la relecture
  audio_scene_filter:
    # Option qualité expérimentale : met en silence les zones non vocales longues
    # sans couper l'audio, afin de préserver les timestamps du SRT.
    enabled: false
    enabled_for_modes:
      - "quality"
    target_labels:
      - "music"
      - "noise"
    min_segment_s: 2.0
    min_total_muted_s: 2.0
    edge_keep_s: 0.15
    max_intervals: 100
    timeout_s: 300
  audio_normalization:
    # Option qualité expérimentale : normalisation légère avant STT, sans changer
    # la durée audio. Désactivée par défaut tant que les gains ne sont pas mesurés.
    enabled: false
    enabled_for_modes:
      - "quality"
    loudnorm_enabled: true
    target_i: -23.0
    true_peak: -2.0
    lra: 11.0
    highpass_hz: null
    timeout_s: 300
    auto_loudnorm_rms_threshold: 0.02
    weak_voice:
      enabled: true
      target_rms: 0.05
      max_gain: 8.0
      loudnorm_after_gain: true
      target_i: -23.0
      true_peak: -2.0
      lra: 11.0
  audio_denoise:
    # Option expérimentale de bench, désactivée par défaut.
    # Débruitage parole expérimental via ffmpeg afftdn (désactivé par défaut).
    enabled: false
    enabled_for_modes:
      - "quality"
    backend: "ffmpeg_afftdn"
    force: false
    trigger_flags:
      - "snr_faible"
    noise_reduction_db: 12.0
    noise_floor_db: -25.0
    timeout_s: 300
  source_separation:
    # Séparation de sources vocales via Demucs (dépendance runtime).
    # Ne s'active JAMAIS automatiquement : c'est SourceSeparationDecider qui
    # décide, sur la base de audio_quality_decision.json et audio_scene, si la
    # séparation est susceptible d'améliorer la qualité STT pour ce job.
    enabled: false
    backend: "demucs"
    model: "htdemucs"         # htdemucs (défaut) | htdemucs_ft (fine-tuned, plus lent)
    device: "auto"            # auto | cpu | cuda | cuda:0 | cuda:1
    segment_s: 10             # secondes de traitement par batch (mémoire vs qualité)
    stem: "vocals"            # tige à extraire : vocals | drums | bass | other
    decision:
      min_score: 3            # seuil de score pour activer la séparation
      min_duration_s: 60      # audio < 60s → séparation non déclenchée (surcoût injustifié)
      scene_music_min_ratio: 0.80       # musique suffisante pour forcer Demucs (évite les faux positifs de salle)
      scene_music_min_duration_s: 60    # ou durée musique minimale en secondes
      scene_music_min_speech_ratio_for_force: 0.08  # évite les faux positifs "musique" quand la parole détectée est quasi nulle
      scene_noise_score_ratio: 0.35     # bruit important → ajoute un score, ne force pas seul
      scene_noise_score: 1
      scene_problem_segments_score_threshold: 3
      scene_problem_segments_score: 1
  speaker_realignment:
    enabled: true
    min_word_overlap_s: 0.01
    punctuation_chars: ".,;:!?)]}»"
  execution:
    max_concurrent_jobs: 1
  # Profil de concurrence (C7 / B8) : observabilité du goulot. La classe de chaque étape
  # (sérielle / déléguée) est dérivée automatiquement (STT distant = délégué, sinon sériel) ;
  # surcharger ici seulement si besoin. Exposé dans GET /api/resources/status (clé "concurrency").
  # concurrency_profile:
  #   transcribe: { class: "delegated", resource: "stt_backend" }
  queue:
    enabled: true
    default_priority: 50
    aging_enabled: true
    aging_interval_minutes: 30
    aging_max_bonus: 49
    poll_interval_s: 5            # latence max de prise en file en l'absence de NOTIFY
    # Réveil instantané cross-process via PostgreSQL LISTEN/NOTIFY (B9). À activer quand le
    # tier web (rôle 'web') et l'ordonnanceur (rôle 'scheduler') sont des process séparés et
    # que la latence du poll (poll_interval_s) gêne. PostgreSQL requis ; le polling reste le
    # filet de sûreté. Défaut false = mono-process, le poll suffit.
    use_listen_notify: false
    starvation_timeout_hours: 24
  scheduling:
    enabled: false
    timezone: "Europe/Paris"
    poll_interval_s: 300
    kill_patterns:
      - "vllm"
      - "llama-server"
      - "text-generation-server"
      - "aphrodite"
      - "sglang"
      - "lmdeploy"
      - "exllamav2"
    windows: []
  summary_llm:
    enabled: true
    # Alias GÉNÉRIQUE recommandé : `local/arbitrage`. On garde ce nom stable quel
    # que soit le modèle réellement servi (palier VRAM) ; seul le script de lancement
    # change. La clé `arbitrage` doit exister dans opencode.json (provider `local`).
    model_id: "local/arbitrage"
    api_base: "http://127.0.0.1:8080/v1"
    timeout_seconds: 1800
  arbitration_llm:
    # Correction du SRT (mode quality) via opencode + LLM d'arbitrage.
    # PRÉREQUIS quand enabled: true — sinon le step "correction" attend puis échoue :
    #   - opencode installé + provider `local` configuré (voir docs) ;
    #   - un LLM OpenAI-compatible joignable sur api_base ;
    #   - model_id = alias opencode (par convention `local/arbitrage`, cf. AGENTS.md).
    # Mettre enabled: false pour désactiver complètement l'étape de correction.
    enabled: true
    model_id: "local/arbitrage"
    api_base: "http://127.0.0.1:8080/v1"
    timeout_seconds: 7200
    opencode_bin: "opencode"

  # Chat d'affinage des livrables (page résultats d'un job terminé) : discuter avec la
  # LLM locale puis APPLIQUER une demande validée — les artefacts texte sont édités sous
  # garde-fous, chaque application crée une version restaurable, les documents (DOCX/ZIP)
  # sont régénérés. Nécessite la LLM d'arbitrage (arbitration_llm.enabled: true).
  refine_chat:
    enabled: true
    # Taille max d'un message utilisateur (caractères).
    max_message_chars: 4000
    # Timeout d'un tour (secondes) — discuss = un appel LLM direct ; apply = un run opencode.
    timeout_seconds: 900
    # Nb de tours conservés dans l'historique (refine/chat.json).
    max_turns_kept: 200
    # Nb de tours rejoués à la LLM à chaque tour (contexte conversationnel).
    context_turns: 12
    # Mode discuss (appel LLM direct) : taille max de la transcription inline (caractères,
    # troncature signalée au-delà) et longueur max de la réponse (tokens).
    max_transcript_chars: 60000
    max_answer_tokens: 2000

  # Types de réunion personnalisés (cf. docs/TYPES_REUNION_PERSONNALISES.md) : tout
  # utilisateur crée des types privés ; les admins les partagent (groupe/global).
  meeting_types:
    # Nombre max de types créés par utilisateur (tous statuts de partage confondus).
    max_per_user: 20

quality:
  # Phrases détectées dans les segments courts (< 1 s) → signalées dans le rapport qualité.
  # Aucun segment n'est supprimé automatiquement ; l'opérateur décide.
  # Listes vides → pas de détection. Enrichir selon les hallucinations observées en production.
  asr_noise_markers:
    # Formules courtes ambiguës (légitimes mais suspectes dans un segment < 1 s)
    - "thank you"
    - "thanks"
    - "okay"
    - "all right"
    - "bye"
    - "absolutely"
    # Fillers français sur silence/bruit court (Whisper génère ces phrases sur le vide)
    # Observés sur test5.wav (voix chuchotée, bench extended 2026-05-23)
    - "voilà"
    - "et voilà"
    - "voilà voilà"
    - "c'est bon"
    - "c'est ça"
    - "c'est juste"
    - "d'accord"
    - "tout à fait"
    - "très bien"
    - "bien sûr"
    - "effectivement"
    - "exactement"
    - "parfait"
    # Outros YouTube / contenus viraux — anglais
    - "thanks for watching"
    - "thank you for watching"
    - "thank you for watching please subscribe"
    - "please subscribe to my channel"
    - "like and subscribe"
    - "don't forget to subscribe"
    - "please like and subscribe"
    # Outros YouTube — français
    - "merci d'avoir regardé cette vidéo"
    - "merci d'avoir regardé"
    - "n'oubliez pas de vous abonner"
    # Outros YouTube — autres langues (Whisper hallucine même sur audio FR)
    - "gracias"
    - "gracias por ver el video"
    - "gracias por ver"
    - "obrigado"
    - "obrigado por assistir"
    - "e aí"
    # Crédits sous-titrage et services de transcription tiers
    - "subtitles by the amara org community"
    - "transcription by castingwords"
    - "rev.com"
    - "otter.ai"
    # Descriptions acoustiques (Whisper remplace parfois les hallucinations par des labels)
    - "music"
    - "applause"
    - "clapping"
    - "typing"
    - "buzzing"
    # Artefacts de corpus divers documentés
    - "come on"
    - "hollywood"
  thresholds:
    # Détection de confiance STT (champs Whisper word-level probability)
    # Segments avec no_speech_prob > seuil → probable hallucination sur silence/bruit
    no_speech_prob_threshold: 0.5
    # Fraction de mots sous low_word_confidence_min → segment peu fiable
    low_word_confidence_ratio: 0.5
    # Seuil individuel : prob < cette valeur → mot "peu fiable"
    low_word_confidence_min: 0.4

diarization:
  cache_enabled: true
  cache_audio_fingerprint: true
  embedding_cache_enabled: true
  embedding_clip_seconds: 12.0
  # Précharge l'audio en RAM avant pyannote. Recommandé pour les réunions longues
  # et les formats compressés (m4a/mp4), afin d'éviter les décodages répétés.
  preload_audio: true
  # Prépare un cache WAV PCM 16 kHz mono uniquement pour pyannote. À activer après
  # validation bench; conserve l'audio original si la durée source/cible diverge.
  prepare_pcm_audio: false
  prepare_pcm_timeout_s: 1800
  prepare_pcm_duration_tolerance_s: 0.25
  # Taille des lots embeddings pyannote. 64 est un défaut prudent; 96/128 peuvent
  # être testés sur GPU avec beaucoup de VRAM, puis validés par bench.
  embedding_batch_size: 64
  # null = valeur du pipeline HF. La segmentation est rarement le goulet ici.
  segmentation_batch_size: null
  progress_log_enabled: true
  progress_log_interval_s: 30.0

  min_speakers: 2            # Empêche VBx de fusionner sous 2 locuteurs
  max_speakers: 20           # Plafond large, évite les explosions sur très long audio
  # num_speakers: null       # Nombre exact (prioritaire sur min/max) — réservé usage futur
  pipeline_params:
    # Paramètres internes pyannote expérimentaux. Laisser à null en production
    # tant qu'un bench de référence n'a pas validé le réglage.
    segmentation:
      min_duration_off: null
    clustering:
      threshold: null
      Fa: null
      Fb: null

security:
  retention_days: 365
  allow_job_delete: true
  max_upload_size_mb: 1024
  allowed_upload_extensions:
    - ".mp3"
    - ".wav"
    - ".m4a"
    - ".mp4"
    - ".flac"
    - ".ogg"
  # Documents présentés joints au contexte du résumé (étape 3 du wizard). Extraction
  # texte pur-Python ; formats XML modernes uniquement (.doc/.ppt hérités non gérés).
  allowed_document_extensions:
    - ".pdf"
    - ".docx"
    - ".pptx"
    - ".txt"
  max_document_size_mb: 25       # taille max d'un document joint
  max_document_chars: 12000      # texte conservé par document (plafond de contexte LLM)
  max_documents_per_job: 15      # nombre max de documents joints par job (borne le contexte)
  audit_retention_days: 1095    # 3 ans — rétention des logs d'audit (RGPD Art. 30/32)
  lexicon_export_admin_only: false # true = export CSV des lexiques réservé aux admins globaux
  audit_retention_by_family:
    auth: 1095                  # Connexions et échecs de connexion
    job: 1095                   # Actions jobs, file GPU et calendrier
    lexicon: 1095               # Gestion, import/export et rattachement des lexiques
    voice: 1095                 # Voix enregistrées, consentements et accès associés
    config: 1095                # Configuration, utilisateurs et groupes
    other: 1095

notifications:
  email:
    enabled: false              # true = activer les notifications email
    smtp_host: ""               # Ex : "smtp.gmail.com", "mail.example.com"
    smtp_port: 587              # 587 (STARTTLS), 465 (SSL/TLS), 25 (SMTP nu)
    smtp_username: ""           # Laisser vide si pas d'authentification
    smtp_password: ""
    use_starttls: true          # Recommandé pour le port 587
    use_ssl: false              # true pour le port 465 (SMTPS)
    from_address: ""            # Ex : "transcria@example.com"
    from_name: "TranscrIA"      # Nom affiché dans le champ "De :"
    base_url: "http://localhost:7870"  # URL publique pour les liens dans les emails

# ──────────────────────────────────────────────────────────────────────────────
# Inférence distante (optionnel) — TranscrIA en frontale dont les ressources GPU
# tournent sur un nœud distant (ou sur 127.0.0.1). mode: local = tout local (défaut,
# comportement historique). Voir docs/SERVICE_RESSOURCES_GPU.md.
# ──────────────────────────────────────────────────────────────────────────────
inference:
  mode: "local"                 # local | remote | hybrid
  url: ""                       # service Flask de ressources (diarize/voice-embed), ex "http://192.168.1.59:8002"
  # Failover actif/passif (C6 / B7) : liste ORDONNÉE de nœuds (priorité = ordre). La frontale
  # vise le premier joignable et bascule automatiquement vers le suivant si injoignable ;
  # quand le principal revient, les jobs suivants y repartent. Laisser vide = un seul nœud (`url`).
  # nodes:
  #   - { url: "http://192.168.1.59:8002", priority: 1 }   # principal
  #   - { url: "http://192.168.1.60:8002", priority: 2 }   # secours (tiède : idle_timeout_s: 0)
  fallback_local: true          # bascule locale si le service distant tombe
  transport:
    audio: "file_ref"           # file_ref (FS partagé) | upload (OBLIGATOIRE en vrai distant)
  resilience:
    timeout_s: 1800
    retries: 2
    max_unavailable_s: 600      # mode dégradé : au-delà, un job dont le nœud reste injoignable échoue
    capabilities_cache_ttl_s: 5 # B6.4 : TTL du cache de /api/resources/status (mutualise les /capabilities). 0 = désactivé
  auth:
    api_key_env: "TRANSCRIA_INFERENCE_API_KEY"   # clé API du service (variable d'env)
    api_key: ""
  stt:
    fallback_local: true
    response_format: "verbose_json"   # défaut global ; surchargé par backend ci-dessous
    concurrency: 1              # >1 = transcription par tour en parallèle (distant uniquement)
    timeout_s: 600
    retries: 2
    auth:
      api_key_env: "TRANSCRIA_STT_API_KEY"
      api_key: ""
    backends:
      # url vide = ce moteur reste local. Renseigner pour servir le STT à distance.
      cohere:  { url: "", model: "cohere-transcribe",  response_format: "json" }          # Cohere refuse verbose_json
      whisper: { url: "", model: "whisper-large-v3", response_format: "verbose_json" }

# Config du NŒUD DE RESSOURCES uniquement (laisser absent côté frontale).
# Décrit les moteurs STT que le service peut gérer (cycle A/B/C). Le placement
# (gpu, port, fraction VRAM) est à la charge de l'admin.
# resource_node:
#   vram:
#     preflight: true           # refuse proprement au lieu d'un OOM
#     auto_relocate: false      # repli sur un autre GPU si l'assigné est plein
#   engines:
#     - { name: cohere,  script: scripts/launch_stt_cohere.sh,  gpu: 3, gpu_mem: 0.85, port: 8003, idle_timeout_s: 0 }
#     - { name: whisper, script: scripts/launch_stt_whisper.sh, gpu: 5, gpu_mem: 0.85, port: 8005, idle_timeout_s: 0 }
#   # idle_timeout_s > 0 : arrêt automatique du moteur après N secondes d'inactivité (idle-stop). 0 = résident.
