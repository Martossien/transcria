server:
  host: "0.0.0.0"
  port: 7870
  debug: true

storage:
  jobs_dir: "./jobs"
  database_url: "sqlite:///transcrIA.db"

voice_enrollment:
  enabled: false
  storage_dir: "./voices"
  require_active_consent: true
  delete_source_audio_after_embedding: true
  allow_global_profiles: false
  require_explicit_job_group_for_multi_group_users: true
  embedding:
    backend: "pyannote"
    model_id: "pyannote/speaker-diarization-community-1"
    model_revision: ""
    expected_dim:
    normalization: "l2"
    min_speech_duration_s: 8.0
    min_segment_duration_s: 1.5
    max_segments_per_speaker: 5
    exclude_overlap: true
  matching:
    enabled_after_summary: true
    suggestion_threshold: 0.75
    high_confidence_threshold: 0.85
    min_top2_margin: 0.08
    max_candidates_per_speaker: 2
    stale_profiles_are_matchable: false
  consent:
    current_form_version: "voice-consent-v1"
    allow_expiration: false
    validity_days:
    proof_allowed_extensions:
      - "pdf"
      - "png"
      - "jpg"
      - "jpeg"
    max_proof_size_mb: 25
  audit:
    log_match_suggestions: true
    log_match_scores: true

auth:
  enabled: true
  first_admin_username: "admin"
  first_admin_password: "CHANGE-ME"

services:
  dashboard_llm_url: "http://127.0.0.1:5001"
  srt_editor_easy_url: "http://127.0.0.1:7861"
  arbitrage_script: "./scripts/launch_arbitrage.sh"
  stop_script: "./scripts/stop_arbitrage_llm.sh"
  arbitrage_llm_port: 8080
  # Ports de backends LLM concurrents à libérer avant de lancer la LLM d'arbitrage
  # Exemples: vLLM, SGLang, llama.cpp, ik_llama.cpp exposés sur un autre port
  llm_cleanup_ports:
    - 8000
  # model_id tel que rapporté par /v1/models (alias du backend OpenAI-compatible)
  # utilisé par ensure_arbitrage_llm_ready() pour éviter un redémarrage inutile
  # lancer scripts/check_arbitrage_llm.sh pour obtenir la valeur exacte
  # arbitrage_api_model_id: "votre-modele-llm-ici"

models:
  stt_backend: "cohere"
  default_stt_model: "cohere-transcribe-03-2026"
  fallback_stt_model: "large-v3"
  cohere_model_path: "./models/cohere-asr/cohere-transcribe-03-2026"
  pyannote_model: "pyannote/speaker-diarization-community-1"

cohere:
  chunk_length_s: 30
  max_new_tokens: 448
  repetition_penalty: 1.2
  no_repeat_ngram_size: 3
  collapse_repetition_loops: true
  repetition_loop_min_repeats: 4
  repetition_loop_max_phrase_words: 10
  repetition_loop_keep_repeats: 2
  lexicon_biasing:
    # Expérimental : biasing contextuel par Trie sur les termes validés du lexique de session.
    # Désactivé par défaut ; à benchmarker par domaine avant activation production.
    enabled: false
    priorities: ["critique", "importante", "normale"]
    max_terms: 300
    boost: 0.2
    start_boost: 0.05
    max_prefix_tokens: 20

whisper:
  # Backend qualité/fallback. Cohere reste le backend normal du workflow.
  model_size: "large-v3"
  compute_type: "float16"
  cpu_threads: 4
  chunk_length_s: 30
  beam_size: 5
  best_of: 5
  vad_filter: true
  word_timestamps: true
  condition_on_previous_text: false
  no_speech_threshold: 0.2
  compression_ratio_threshold: 2.0
  log_prob_threshold: -1.0
  hallucination_silence_threshold: 3.0
  repetition_penalty: 1.0
  no_repeat_ngram_size: 0
  suppress_numerals: false
  hotwords:
  initial_prompt:
  lexicon_hotwords:
    # Expérimental : injecte les termes critiques/importants du lexique de session dans les hotwords Whisper.
    # Désactivé par défaut car Whisper n'est pas systématiquement meilleur et le biasing doit rester mesuré.
    enabled: false
    priorities: ["critique", "importante"]
    max_terms: 50
    max_chars: 900
    max_tokens: 200
    tokenizer_model: "openai/whisper-large-v3"
    prefix: "Termes importants :"
  collapse_repetition_loops: true
  repetition_loop_min_repeats: 4
  repetition_loop_max_phrase_words: 10
  repetition_loop_keep_repeats: 2
  forced_alignment:
    # Alignement CTC natif optionnel ; désactivé par défaut pour éviter un téléchargement de modèle non demandé.
    enabled: false
    backend: "torchaudio_ctc"
    bundle_name: "VOXPOPULI_ASR_BASE_10K_FR"
    max_segment_s: 30.0

gpu:
  cohere_vram_mb: 6000
  pyannote_vram_mb: 2000
  llm_vram_mb: 60000
  min_free_vram_mb: 4000

workflow:
  enable_quick_summary: true
  enable_speaker_detection: true
  enable_quality_mode: true
  enable_external_srt_editor_link: true
  enable_vad: true
  audio_quality:
    force_quality_backend: true
    degraded_levels:
      - "degrade"
    suspect_levels:
      - "suspect"
    min_bit_rate: 64000
    min_sample_rate_hz: 16000
    max_non_latin_segments: 2
    max_short_segment_ratio: 0.2
    min_speech_ratio: 0.35
    max_speech_ratio: 0.95
    scene_affects_quality_score: false  # audit seulement par défaut, pas de forçage backend
    max_scene_music_ratio: 0.15
    max_scene_noise_ratio: 0.20
    max_scene_no_energy_ratio: 0.30
    min_scene_speech_ratio: 0.55
    max_scene_problem_segments: 3
  quality_transcription:
    # Le mode "quality" active le workflow complet, mais ne force plus Whisper par défaut.
    # Cohere reste le backend principal ; définir force_stt_backend: "whisper" + enabled_for_modes
    # seulement pour des campagnes ciblées ou des environnements qui le justifient.
    force_stt_backend:
    enabled_for_modes: []
    force_on_degraded_summary: false
    degraded_summary_levels:
      - "degrade"
  audio_preflight:
    # Diagnostic acoustique déterministe pré-STT. Il ne modifie jamais l'audio ;
    # il produit metadata/audio_preflight.json pour logs, audit qualité et décisions futures.
    enabled: true
    frame_ms: 30
    low_rms_threshold: 0.02
    very_low_rms_threshold: 0.008
    silence_rms_threshold: 0.003
    low_snr_db_threshold: 6.0
    narrowband_hz_threshold: 3800.0
    clipping_threshold: 0.98
    clipping_ratio_threshold: 0.001
  segment_reliability:
    # Ajoute reliability=ok|suspect|degrade sur chaque segment ASR.
    # Ce score ne supprime rien ; il sert au rapport qualité et aux futures protections LLM.
    enabled: true
    no_speech_prob_threshold: 0.5
    low_word_confidence_ratio: 0.5
    low_word_confidence_min: 0.4
    micro_segment_s: 0.35
    short_segment_s: 0.8
    # Flags textuels configurables. Aucun terme métier n'est codé en dur :
    # ajoutez ici vos regex si des hallucinations génériques récurrentes sont observées.
    detect_non_latin: true
    non_latin_char_pattern: "[\\u0400-\\u04FF\\u0600-\\u06FF\\u0750-\\u077F\\u4E00-\\u9FFF\\u3040-\\u30FF\\uAC00-\\uD7AF]"
    non_latin_min_chars: 2
    detect_generic_hallucinations: true
    generic_hallucination_patterns:
      # Signatures génériques connues d'hallucinations ASR/Whisper sur silence, bruit,
      # artefacts vidéo ou corpus sous-titrés. Liste configurable : retirer/ajouter selon vos audios.
      - "\\bpour plus d['’]informations\\b"
      - "\\babonnez[- ]?vous\\b"
      - "\\bcontactez[- ]?nous\\b"
      - "\\bsite web\\b"
      - "\\bregard[ée] cette vid[ée]o\\b"
      - "\\bsous[- ]?titrage\\b"
      - "\\bradio[- ]?canada\\b"
      - "\\buniversit[eé] d['’]ottawa\\b"
    degrade_on_text_flags: true
  pyannote_chunking:
    # Post-traitement conservateur des tours pyannote avant STT.
    # Objectif : réduire les micro-chunks sans perdre les interjections utiles.
    merge_micro_chunks: true
    micro_chunk_s: 0.35
    micro_chunk_neighbor_gap_s: 0.4
    isolated_min_chunk_s: 0.3
    padding_s: 0.15
    max_chunk_s: 30
    min_chunk_s: 1.5
  vad:
    enabled_summary: true
    enabled_final: false
    auto_enable_final_on_degraded: true
    auto_enable_final_levels:
      - "degrade"
    hysteresis_enabled: false
    onset: 0.5
    offset: 0.35
    adaptive: true
    threshold: 0.5
    threshold_low_quality: 0.35
    threshold_high_noise: 0.6
    threshold_final_degraded: 0.6
    min_speech_duration_ms: 250
    min_silence_duration_ms: 400
    min_silence_duration_ms_low_quality: 250
    speech_pad_ms: 200
    speech_pad_ms_low_quality: 350
  transcription_cleanup:
    enabled: true
    remove_subtitle_artifacts: true
    merge_short_segments: true
    short_segment_max_s: 0.45
    short_segment_max_words: 2
    merge_gap_s: 0.5
    merge_max_chars: 220
    # Listes vides → défauts intégrés (marqueurs Radio-Canada/sous-titrage).
    # Listes non vides → remplacent entièrement les défauts.
    subtitle_artifact_patterns: []   # regex (ex. "\\bwatermark\\b")
    subtitle_artifact_words: []      # mots exacts normalisés (ex. "noise")
  audio_scene:
    # Analyse acoustique de scène en subprocess isolé (librosa — aucune dépendance GPU).
    # Produit : ratios parole/non-parole, segments horodatés, distribution H/F.
    # Quand enabled: true, SourceSeparationDecider priorise ces signaux sur le score.
    enabled: false
    timeout_s: 120            # durée maximale allouée au subprocess (secondes)
    detect_gender: true       # sous-classification speech → male / female via pitch (YIN)
    thresholds:
      energy_ratio: 0.03      # fraction de l'énergie RMS moyenne → inactivité
      min_segment_s: 0.3      # segments plus courts ignorés
      noise_flatness_min: 0.40  # spectral flatness > seuil → bruit
      music_flatness_max: 0.12  # flatness < seuil ET ZCR < zcr_max → musique
      music_zcr_max: 0.10
      female_pitch_hz: 165.0  # pitch médian ≥ seuil → voix féminine
      problem_segment_min_s: 2.0  # zone non vocale minimale exposée à la relecture
  audio_scene_filter:
    # Option qualité expérimentale : met en silence les zones non vocales longues
    # sans couper l'audio, afin de préserver les timestamps du SRT.
    enabled: false
    enabled_for_modes:
      - "quality"
    target_labels:
      - "music"
      - "noise"
    min_segment_s: 2.0
    min_total_muted_s: 2.0
    edge_keep_s: 0.15
    max_intervals: 100
    timeout_s: 300
  audio_normalization:
    # Option qualité expérimentale : normalisation légère avant STT, sans changer
    # la durée audio. Désactivée par défaut tant que les gains ne sont pas mesurés.
    enabled: false
    enabled_for_modes:
      - "quality"
    loudnorm_enabled: true
    target_i: -23.0
    true_peak: -2.0
    lra: 11.0
    highpass_hz: null
    timeout_s: 300
    auto_loudnorm_rms_threshold: 0.02
    weak_voice:
      enabled: true
      target_rms: 0.05
      max_gain: 8.0
      loudnorm_after_gain: true
      target_i: -23.0
      true_peak: -2.0
      lra: 11.0
  audio_denoise:
    # Option expérimentale de bench, désactivée par défaut.
    # Débruitage parole expérimental via ffmpeg afftdn (désactivé par défaut).
    enabled: false
    enabled_for_modes:
      - "quality"
    backend: "ffmpeg_afftdn"
    force: false
    trigger_flags:
      - "snr_faible"
    noise_reduction_db: 12.0
    noise_floor_db: -25.0
    timeout_s: 300
  source_separation:
    # Séparation de sources vocales via Demucs (dépendance runtime).
    # Ne s'active JAMAIS automatiquement : c'est SourceSeparationDecider qui
    # décide, sur la base de audio_quality_decision.json et audio_scene, si la
    # séparation est susceptible d'améliorer la qualité STT pour ce job.
    enabled: false
    backend: "demucs"
    model: "htdemucs"         # htdemucs (défaut) | htdemucs_ft (fine-tuned, plus lent)
    device: "auto"            # auto | cpu | cuda | cuda:0 | cuda:1
    segment_s: 10             # secondes de traitement par batch (mémoire vs qualité)
    stem: "vocals"            # tige à extraire : vocals | drums | bass | other
    decision:
      min_score: 3            # seuil de score pour activer la séparation
      min_duration_s: 60      # audio < 60s → séparation non déclenchée (surcoût injustifié)
      scene_music_min_ratio: 0.80       # musique suffisante pour forcer Demucs (évite les faux positifs de salle)
      scene_music_min_duration_s: 60    # ou durée musique minimale en secondes
      scene_music_min_speech_ratio_for_force: 0.08  # évite les faux positifs "musique" quand la parole détectée est quasi nulle
      scene_noise_score_ratio: 0.35     # bruit important → ajoute un score, ne force pas seul
      scene_noise_score: 1
      scene_problem_segments_score_threshold: 3
      scene_problem_segments_score: 1
  speaker_realignment:
    enabled: true
    min_word_overlap_s: 0.01
    punctuation_chars: ".,;:!?)]}»"
  execution:
    max_concurrent_jobs: 1
  summary_llm:
    enabled: true
    model_id: "local/votre-modele-llm-ici"
    api_base: "http://127.0.0.1:8080/v1"
    timeout_seconds: 1800
  arbitration_llm:
    enabled: false
    model_id: "local/votre-modele-llm-ici"
    api_base: "http://127.0.0.1:8080/v1"
    timeout_seconds: 7200
    opencode_bin: "opencode"

quality:
  # Phrases détectées dans les segments courts (< 1 s) → signalées dans le rapport qualité.
  # Aucun segment n'est supprimé automatiquement ; l'opérateur décide.
  # Listes vides → pas de détection. Enrichir selon les hallucinations observées en production.
  asr_noise_markers:
    # Formules courtes ambiguës (légitimes mais suspectes dans un segment < 1 s)
    - "thank you"
    - "thanks"
    - "okay"
    - "all right"
    - "bye"
    - "absolutely"
    # Fillers français sur silence/bruit court (Whisper génère ces phrases sur le vide)
    # Observés sur test5.wav (voix chuchotée, bench extended 2026-05-23)
    - "voilà"
    - "et voilà"
    - "voilà voilà"
    - "c'est bon"
    - "c'est ça"
    - "c'est juste"
    - "d'accord"
    - "tout à fait"
    - "très bien"
    - "bien sûr"
    - "effectivement"
    - "exactement"
    - "parfait"
    # Outros YouTube / contenus viraux — anglais
    - "thanks for watching"
    - "thank you for watching"
    - "thank you for watching please subscribe"
    - "please subscribe to my channel"
    - "like and subscribe"
    - "don't forget to subscribe"
    - "please like and subscribe"
    # Outros YouTube — français
    - "merci d'avoir regardé cette vidéo"
    - "merci d'avoir regardé"
    - "n'oubliez pas de vous abonner"
    # Outros YouTube — autres langues (Whisper hallucine même sur audio FR)
    - "gracias"
    - "gracias por ver el video"
    - "gracias por ver"
    - "obrigado"
    - "obrigado por assistir"
    - "e aí"
    # Crédits sous-titrage et services de transcription tiers
    - "subtitles by the amara org community"
    - "transcription by castingwords"
    - "rev.com"
    - "otter.ai"
    # Descriptions acoustiques (Whisper remplace parfois les hallucinations par des labels)
    - "music"
    - "applause"
    - "clapping"
    - "typing"
    - "buzzing"
    # Artefacts de corpus divers documentés
    - "come on"
    - "hollywood"
  thresholds:
    # Détection de confiance STT (champs Whisper word-level probability)
    # Segments avec no_speech_prob > seuil → probable hallucination sur silence/bruit
    no_speech_prob_threshold: 0.5
    # Fraction de mots sous low_word_confidence_min → segment peu fiable
    low_word_confidence_ratio: 0.5
    # Seuil individuel : prob < cette valeur → mot "peu fiable"
    low_word_confidence_min: 0.4

diarization:
  cache_enabled: true
  cache_audio_fingerprint: true
  embedding_cache_enabled: true
  embedding_clip_seconds: 12.0

security:
  retention_days: 365
  allow_job_delete: true
  max_upload_size_mb: 1024
  allowed_upload_extensions:
    - ".mp3"
    - ".wav"
    - ".m4a"
    - ".mp4"
    - ".flac"
    - ".ogg"
