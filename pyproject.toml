[tool.ruff]
line-length = 140

[tool.ruff.lint]
select = ["E", "W", "F", "I"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "transcria.auth.models",
    "transcria.audit.models",
    "transcria.jobs.models",
    "transcria.voice.models",
    "transcria.queue.models",
    "transcria.context.central_lexicon_models",
]
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    "transcria.stt.whisper_transcriber",
    "transcria.stt.granite_transcriber",
    "transcria.stt.parakeet_transcriber",
    "transcria.stt.cohere_transcriber",
    "transcria.stt.sortformer_diarizer",
    "transcria.stt.diarization",
    "transcria.voice.embedding",
    "transcria.stt.contextual_biasing",
    "transcria.exports.docx_report",
]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = ["backup", ".git", "__pycache__", ".venv", "node_modules"]
