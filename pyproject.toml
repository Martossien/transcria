[tool.ruff]
line-length = 140

[tool.ruff.lint]
select = ["E", "W", "F", "I"]

# Tri d'imports déterministe entre local et CI. Le dossier racine `alembic/`
# (migrations, sans __init__.py) est auto-détecté comme first-party par certaines
# versions de ruff → on force `alembic` en third-party (ce qu'il est) et on épingle
# nos paquets first-party.
[tool.ruff.lint.isort]
known-first-party = ["transcria", "inference_service"]
known-third-party = ["alembic"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "transcria.auth.models",
    "transcria.audit.models",
    "transcria.jobs.models",
    "transcria.voice.models",
    "transcria.queue.models",
    "transcria.context.central_lexicon_models",
]
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    "transcria.stt.contextual_biasing",
    "transcria.exports.docx_report",
]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = ["backup", ".git", "__pycache__", ".venv", "node_modules"]
markers = [
    # Tests réseau sur un vrai socket TCP (faux serveurs en thread, sans GPU).
    # Cibler : pytest -m integration   |   exclure : pytest -m "not integration"
    "integration: test réseau sur un vrai socket TCP",
]
