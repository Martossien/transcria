# Catalogue des profils LLM d'arbitrage — SOURCE DE VÉRITÉ UNIQUE (données, pas de hardcode).
# ─────────────────────────────────────────────────────────────────────────────
# Un « palier » = « faire au mieux avec le matériel physiquement présent ». La sélection
# est pilotée par le matériel (transcria/config/llm_profiles.select_profile) :
#   - mono-GPU  → meilleur modèle qui tient sur UNE carte ;
#   - multi-GPU → on ACTIVE le multi-GPU (llama.cpp tensor-split, Ollama spread, vLLM TP).
# Le contexte est VARIABLE par palier (plus de VRAM ⇒ plus de contexte).
#
# ⚠ AUCUNE TAILLE DE MODÈLE EN DUR ICI. L'empreinte VRAM (poids + KV) est DÉRIVÉE
# (transcria/gpu/llm_footprint) : poids = taille RÉELLE du fichier téléchargé, KV = CALCULÉ
# depuis l'archi (métadonnées GGUF / config.json) + le contexte du palier ; puis RECALÉE par
# la MESURE au 1ᵉʳ load (Ollama /api/ps ; logs llama.cpp/vLLM). Ce fichier ne porte donc que
# l'IDENTIFIANT du modèle + le contexte + la stratégie de placement + le dtype du KV.
#
# Modèles ANCRÉS sur le bench llama.cpp (Qwen3.5-9B / Qwen3.6-27B / Qwen3.6-35B-A3B) ;
# tags/fichiers VÉRIFIÉS à la source (registre Ollama / HF) — jamais de mémoire.
# Surchargeable : `workflow.arbitration_llm.profiles_file` dans config.yaml.

schema_version: 2

# Recommandation de MOTEUR à l'installation (C2.1 — « aider l'utilisateur ») :
# sur les petits paliers, llama.cpp sert un modèle d'une CLASSE supérieure à celui
# qu'Ollama peut charger sur la même carte (bench) → recommandé, en l'expliquant.
# Au-delà du seuil, les deux servent des modèles comparables → Ollama pour la
# simplicité (aucune compilation), llama.cpp pour le contrôle fin.
engine_recommendation:
  prefer_llamacpp_when_per_card_vram_mb_lt: 31000
  reason_llamacpp: >-
    avec {per_card_gb} Go de VRAM par carte, llama.cpp sert {llamacpp_model}
    (contexte {llamacpp_ctx}k) là où Ollama servirait {ollama_model} — meilleure
    qualité mesurée sur ce palier (bench). Ollama reste possible mais déconseillé ici.
  reason_ollama: >-
    avec {per_card_gb} Go de VRAM par carte, Ollama sert {ollama_model}
    (comparable à llama.cpp sur ce palier) — simple, sans compilation, recommandé.
    llama.cpp reste la voie « contrôle fin / multi-GPU avancé ».

engines:

  # ── llama.cpp ──────────────────────────────────────────────────────────────
  # Palier par VRAM TOTALE (tensor-split sur `gpus` cartes). Quant fin + KV q8_0.
  # `min_vram_mb`/`gpus` = calibration bench (placement) ; les MODÈLES = bench llama.cpp.
  # `vram_budget_mb` = budget de placement (tensor-split ; ex-TIER_VRAM_MB), DISTINCT de
  # `min_vram_mb` (seuil de sélection). La réservation runtime `gpu.llm_vram_mb`, elle, est
  # DÉRIVÉE (poids GGUF réels + KV) — pas ce budget.
  llamacpp:
    select_by: total_vram_mb
    kv_dtype_bytes: 1              # cache-type q8_0 ≈ 1 octet/élément (KV calculé)
    download: hf                   # hf download <repo> <file>  (le NOM suffit, pas d'URL)
    tiers:
      - {id: "12", min_vram_mb: 11500, vram_budget_mb: 12000, gpus: 1, context: 196608,
         model: {repo: "unsloth/Qwen3.5-9B-GGUF", file: "Qwen3.5-9B-Q5_K_M.gguf", dir: "Qwen3.5-9B-Q5_K_M"}}
      - {id: "16", min_vram_mb: 15500, vram_budget_mb: 16000, gpus: 1, context: 262144,
         model: {repo: "unsloth/Qwen3.5-9B-GGUF", file: "Qwen3.5-9B-Q6_K.gguf", dir: "Qwen3.5-9B-Q6_K"}}
      - {id: "24", min_vram_mb: 23000, vram_budget_mb: 24000, gpus: 1, context: 262144,
         model: {repo: "unsloth/Qwen3.6-35B-A3B-GGUF", file: "Qwen3.6-35B-A3B-UD-IQ4_NL_XL.gguf", dir: "Qwen3.6-35B-A3B-UD-IQ4_NL_XL"}}
      - {id: "32", min_vram_mb: 31000, vram_budget_mb: 32000, gpus: 2, context: 196608,
         model: {repo: "unsloth/Qwen3.6-27B-GGUF", file: "Qwen3.6-27B-Q5_K_M.gguf", dir: "Qwen3.6-27B-Q5_K_M"}}
      - {id: "48", min_vram_mb: 46000, vram_budget_mb: 48000, gpus: 2, context: 262144,
         model: {repo: "unsloth/Qwen3.6-35B-A3B-GGUF", file: "Qwen3.6-35B-A3B-UD-Q6_K.gguf", dir: "Qwen3.6-35B-A3B-UD-Q6_K"}}
      - {id: "64", min_vram_mb: 60000, vram_budget_mb: 60000, gpus: 3, context: 262144,
         model: {repo: "unsloth/Qwen3.6-35B-A3B-GGUF", file: "Qwen3.6-35B-A3B-UD-Q8_K_XL.gguf", dir: "Qwen3.6-35B-A3B-UD-Q8_K_XL"}}

  # ── Ollama ─────────────────────────────────────────────────────────────────
  # mono-GPU → palier par VRAM PAR-CARTE ; multi-GPU (≥2) → spread + palier par VRAM TOTALE.
  # Empreinte MESURÉE via /api/ps au 1ᵉʳ load (pas de littéral). Téléchargement = ollama pull.
  #
  # ⚠ RECOMMANDATION : pour les petits paliers (12/16/24), **llama.cpp est préférable** :
  #   - Quantizations plus fines (Q5_K_M / Q6_K / IQ4_NL) vs Q4_K_M Ollama par défaut
  #   - KV cache q8_0 (1 octet) vs fp16 (2 octets) → 2× moins de VRAM KV → tient sur de plus petites cartes
  #   - Modèles ancrés sur le bench (BENCH_LLM_PALIERS.md, lecture humaine)
  #   - Déterministe (Ollama gemma4:12b mode thinking = 0 production 2/3 runs, Tests 6/7)
  # Ollama reste le backend « facile » (aucune compilation, aucun nvcc, curl|sh) — à utiliser
  # si llama.cpp n'est pas disponible ou pour les gros paliers (48/64) où la différence de
  # quantization est moins critique (35b Q4_K_M validé Tests 1/5/8).
  ollama:
    select_by: per_card_then_total
    kv_dtype_bytes: 2             # KV fp16 par défaut (Ollama)
    download: ollama_pull
    multi_gpu: {enable_when_gpus_gte: 2, env: {OLLAMA_SCHED_SPREAD: "1"}}
    tiers:
      - {id: "12", min_vram_mb: 11500, context: 131072, model: "qwen3.5:4b"}
      - {id: "16", min_vram_mb: 15500, context: 262144, model: "gemma4:12b"}
      - {id: "24", min_vram_mb: 23000, context: 262144, model: "gemma4:12b"}
      - {id: "32", min_vram_mb: 31000, context: 196608, model: "qwen3.6:27b"}
      - {id: "48", min_vram_mb: 46000, context: 262144, model: "qwen3.6:35b"}
      - {id: "64", min_vram_mb: 60000, context: 262144, model: "qwen3.6:35b"}

  # ── vLLM ───────────────────────────────────────────────────────────────────
  # Palier par VRAM TOTALE ÷ TP. TP auto = nb GPU borné aux valeurs valides (têtes). Poids FP8.
  # Empreinte = poids HF (safetensors) + KV(max_model_len) ; recalée par les logs au 1ᵉʳ load.
  vllm:
    select_by: total_vram_mb
    kv_dtype_bytes: 2             # KV fp16
    download: hf                  # vllm serve <repo id> → cache HF au démarrage
    tp: {auto_from_gpu_count: true, valid: [1, 2, 4, 8]}
    tiers:
      - {id: "48", min_vram_mb: 46000, tp: 2, context: 131072, model: "Qwen/Qwen3.6-27B-FP8"}
      - {id: "96", min_vram_mb: 92000, tp: 4, context: 262144, model: "Qwen/Qwen3.6-27B-FP8"}
