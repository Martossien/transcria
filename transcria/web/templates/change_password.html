{% extends "base.html" %}
{% block title %}Changer mon mot de passe — TranscIA{% endblock %}
{% block content %}
<h1 class="h3 mb-4">Changer mon mot de passe</h1>

<div class="card">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Mot de passe actuel</label>
        <input type="password" name="current_password" class="form-control" autocomplete="current-password" required>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Nouveau mot de passe</label>
          <input type="password" name="new_password" class="form-control" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Confirmation</label>
          <input type="password" name="confirm_password" class="form-control" autocomplete="new-password" minlength="8" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Mettre à jour</button>
      <a href="/" class="btn btn-outline-secondary">Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
