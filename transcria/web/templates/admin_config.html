{% extends "base.html" %}
{% block title %}Configuration — TranscIA{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">Configuration</h1>
  <a href="/" class="btn btn-outline-secondary">Retour</a>
</div>

<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span>config.yaml</span>
    <code>{{ config_path }}</code>
  </div>
  <div class="card-body">
    <form method="POST" action="/admin/config">
      <textarea name="config_yaml" class="form-control font-monospace" rows="28" spellcheck="false">{{ config_yaml }}</textarea>
      <div class="mt-3 d-flex gap-2">
        <button type="submit" class="btn btn-primary">Sauvegarder</button>
        <a href="/admin/config" class="btn btn-outline-secondary">Recharger</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
