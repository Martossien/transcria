{% extends "base.html" %}
{% block title %}{{ _('Erreur %(code)s', code=code) }} — TranscrIA{% endblock %}
{% block content %}
<div class="text-center py-5">
  <div class="display-1 text-muted mb-3">{{ code }}</div>
  <h1 class="h4 mb-3">{{ heading }}</h1>
  <p class="text-muted mb-4">{{ message }}</p>
  <a href="/" class="btn btn-primary">
    <i class="bi bi-house-door me-1"></i> {{ _("Retour à l'accueil") }}
  </a>
</div>
{% endblock %}
