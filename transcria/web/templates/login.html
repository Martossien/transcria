{% extends "base.html" %}
{% block title %}{{ _('Connexion') }} — TranscrIA{% endblock %}
{% block head %}
<style>
  .login-container { max-width: 420px; margin: 80px auto 0; }
  .login-card { padding: 32px; }
  .login-card h2 { margin-bottom: 24px; font-weight: 700; }
</style>
{% endblock %}
{% block content %}
<div class="login-container">
  <div class="card login-card">
    <h2 class="text-center"><i class="bi bi-file-earmark-text"></i> TranscrIA</h2>
    <p class="text-muted text-center mb-4">{{ _('Portail de transcription de réunion') }}</p>
    <form method="POST" action="/login">
      <div class="mb-3">
        <label for="username" class="form-label">{{ _("Nom d'utilisateur") }}</label>
        <input type="text" class="form-control" id="username" name="username" required autofocus>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">{{ _('Mot de passe') }}</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">{{ _('Se connecter') }}</button>
    </form>
  </div>
</div>
{% endblock %}
