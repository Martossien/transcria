name: tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        # Miroir AWS ECR Public de l'image officielle Postgres : évite les timeouts et le
        # rate-limit des pulls anonymes Docker Hub sur les runners GitHub (registry-1.docker.io).
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_PASSWORD: ci_test_pwd
          POSTGRES_USER: postgres
          POSTGRES_DB: transcria_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check transcria/ inference_service/ --line-length 140 --select E,W,F,I

      - name: Type check (mypy)
        run: mypy transcria/ inference_service/ --ignore-missing-imports

      - name: Run test suite with coverage
        env:
          TRANSCRIA_TEST_PG_HOST: 127.0.0.1
          TRANSCRIA_TEST_PG_PORT: 5432
          TRANSCRIA_TEST_PG_USER: postgres
          TRANSCRIA_TEST_PG_PASSWORD: ci_test_pwd
        run: python -m pytest tests/ -q --cov=transcria --cov-report=xml --cov-report=term-missing --cov-fail-under=75

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  install-check:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    services:
      postgres:
        # Miroir AWS ECR Public de l'image officielle Postgres : évite les timeouts et le
        # rate-limit des pulls anonymes Docker Hub sur les runners GitHub (registry-1.docker.io).
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_PASSWORD: ci_test_pwd
          POSTGRES_USER: transcria
          POSTGRES_DB: transcria_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Bash syntax check (install.sh + scripts Docker)
        run: bash -n install.sh && bash -n scripts/docker_quickstart.sh && bash -n scripts/setup_docker_gpu.sh

      # Valide le schéma compose (pas de build d'image — lourd, réservé à un job dédié/nuit)
      # ET les services rendus par profil : garantit que web/all-in-one ne coexistent jamais
      # (:7870) même si quelqu'un retire un `profiles:` par accident (config resterait valide).
      - name: Validate docker-compose (schema + invariants de profils)
        env:
          POSTGRES_PASSWORD: ci_dummy
          HF_TOKEN: ""
          HF_CACHE_DIR: /tmp/hf
        run: |
          set -e
          split="$(docker compose --profile split config --services | sort | tr '\n' ' ')"
          gpu="$(docker compose --profile gpu config --services | sort | tr '\n' ' ')"
          echo "split: $split"; echo "gpu:   $gpu"
          # split = web + scheduler (+ db/migrate), SANS all-in-one
          grep -qw web <<<"$split" && grep -qw scheduler <<<"$split"
          grep -qw all-in-one <<<"$split" && { echo "ERREUR: all-in-one dans le profil split"; exit 1; } || true
          # gpu = all-in-one (+ db/migrate), SANS web ni scheduler (sinon conflit :7870)
          grep -qw all-in-one <<<"$gpu"
          grep -qwE 'web|scheduler' <<<"$gpu" && { echo "ERREUR: web/scheduler dans le profil gpu (conflit :7870)"; exit 1; } || true
          echo "invariants de profils : OK"

      - name: Run migration tests against PostgreSQL
        env:
          TRANSCRIA_DATABASE_URL: postgresql+psycopg://transcria:ci_test_pwd@127.0.0.1:5432/transcria_ci
        run: python -m pytest tests/test_migrate_sqlite_to_postgres.py -v

  security:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks scanne tout l'historique

      - name: Scan de secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # pip-audit est INFORMATIF (continue-on-error) : la pile ML (torch, pyannote…) traîne
      # régulièrement des CVE transitives non corrigeables côté projet ; on veut la visibilité
      # sans bloquer la CI. À durcir (gate) une fois la surface de dépendances maîtrisée.
      - name: Audit des dépendances (pip-audit, informatif)
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt --desc

  ui-walkthrough:
    # Parcours UI réel piloté par navigateur (Playwright, sans GPU) : login, accueil,
    # création de job + wizard, éditeur de config (onglets form/YAML + sauvegarde) et
    # toutes les pages admin. Échoue (exit≠0) sur une erreur serveur 5xx, une assertion
    # perdue ou une erreur console JS. Instance web JETABLE (rôle web, SQLite temp) :
    # aucune étape pipeline déclenchée → pas de GPU requis.
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Instance web jetable + walkthrough Playwright
        env:
          TRANSCRIA_SECRET: walk-ci-secret
        run: |
          set -e
          WORK="${RUNNER_TEMP}/ui_walk"
          mkdir -p "$WORK/jobs" "$WORK/shots"
          printf 'runtime: {role: web}\nauth: {first_admin_username: admin, first_admin_password: walkthrough-admin-pw}\nstorage: {jobs_dir: %s/jobs}\nnotifications: {email: {enabled: false}}\n' "$WORK" > "$WORK/config.yaml"

          export TRANSCRIA_CONFIG="$WORK/config.yaml"
          export TRANSCRIA_DATABASE_URL="sqlite:///$WORK/app.db"

          # Seed un job terminé AVANT le serveur (pas d'accès SQLite concurrent) pour
          # couvrir la page /result sans GPU.
          python scripts/seed_completed_job.py --id-file "$WORK/job_id.txt"
          JOB_ID="$(cat "$WORK/job_id.txt")"
          echo "Job terminé seedé : $JOB_ID"

          python app.py --port 7899 --host 127.0.0.1 --no-debug > "$WORK/server.log" 2>&1 &
          SERVER_PID=$!

          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://127.0.0.1:7899/ready; then echo "Serveur prêt (${i}s)"; break; fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then echo "::error::le serveur web s'est arrêté avant d'être prêt"; cat "$WORK/server.log"; exit 1; fi
            sleep 1
          done

          set +e
          python scripts/ui_walkthrough.py --base-url http://127.0.0.1:7899 \
            --user admin --password walkthrough-admin-pw --out "$WORK/shots" \
            --result-job-id "$JOB_ID"
          STATUS=$?
          set -e
          kill "$SERVER_PID" 2>/dev/null || true
          if [ "$STATUS" -ne 0 ]; then echo "::error::échec du walkthrough UI (voir les captures en artefact)"; cat "$WORK/server.log"; fi
          exit "$STATUS"

      - name: Upload des captures (diagnostic)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-walkthrough-shots
          path: ${{ runner.temp }}/ui_walk/shots
