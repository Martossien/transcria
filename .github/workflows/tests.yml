name: tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        # Miroir AWS ECR Public de l'image officielle Postgres : évite les timeouts et le
        # rate-limit des pulls anonymes Docker Hub sur les runners GitHub (registry-1.docker.io).
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_PASSWORD: ci_test_pwd
          POSTGRES_USER: postgres
          POSTGRES_DB: transcria_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check transcria/ inference_service/ --line-length 140 --select E,W,F,I

      - name: Type check (mypy)
        run: mypy transcria/ inference_service/ --ignore-missing-imports

      - name: Run test suite with coverage
        env:
          TRANSCRIA_TEST_PG_HOST: 127.0.0.1
          TRANSCRIA_TEST_PG_PORT: 5432
          TRANSCRIA_TEST_PG_USER: postgres
          TRANSCRIA_TEST_PG_PASSWORD: ci_test_pwd
        run: python -m pytest tests/ -q --cov=transcria --cov-report=xml --cov-report=term-missing --cov-fail-under=65

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  install-check:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    services:
      postgres:
        # Miroir AWS ECR Public de l'image officielle Postgres : évite les timeouts et le
        # rate-limit des pulls anonymes Docker Hub sur les runners GitHub (registry-1.docker.io).
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_PASSWORD: ci_test_pwd
          POSTGRES_USER: transcria
          POSTGRES_DB: transcria_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Bash syntax check (install.sh)
        run: bash -n install.sh

      - name: Run migration tests against PostgreSQL
        env:
          TRANSCRIA_DATABASE_URL: postgresql+psycopg://transcria:ci_test_pwd@127.0.0.1:5432/transcria_ci
        run: python -m pytest tests/test_migrate_sqlite_to_postgres.py -v
