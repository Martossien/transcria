<svg xmlns="http://www.w3.org/2000/svg" width="980" height="680" viewBox="0 0 980 680" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <symbol id="ico-pc" viewBox="0 0 24 24">
      <g fill="none" stroke="#64748b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2.5" y="3.5" width="19" height="13" rx="1.8"/>
        <line x1="12" y1="16.5" x2="12" y2="20"/><line x1="8" y1="20.5" x2="16" y2="20.5"/>
      </g>
    </symbol>
    <symbol id="ico-gpu" viewBox="0 0 24 24">
      <g fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="5" width="14" height="14" rx="2" fill="#2563eb" fill-opacity="0.10"/>
        <rect x="8.5" y="8.5" width="7" height="7" rx="1"/>
        <line x1="9" y1="5" x2="9" y2="2.5"/><line x1="15" y1="5" x2="15" y2="2.5"/>
        <line x1="9" y1="19" x2="9" y2="21.5"/><line x1="15" y1="19" x2="15" y2="21.5"/>
        <line x1="5" y1="9" x2="2.5" y2="9"/><line x1="5" y1="15" x2="2.5" y2="15"/>
        <line x1="19" y1="9" x2="21.5" y2="9"/><line x1="19" y1="15" x2="21.5" y2="15"/>
      </g>
    </symbol>
    <symbol id="ico-user" viewBox="0 0 24 24">
      <g fill="none" stroke="#64748b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8.5" r="3.8"/><path d="M5,20 a7,7 0 0 1 14,0"/>
      </g>
    </symbol>
    <style>
      .title{font-size:19px;font-weight:700;fill:#0f172a}
      .chip{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;fill:#4f46e5;font-weight:600}
      .nt{font-size:15.5px;font-weight:700;fill:#0f172a}
      .ns{font-size:11.5px;fill:#64748b}
      .usr{font-size:12px;font-weight:600;fill:#64748b}
      .lbl{font-size:11px;fill:#94a3b8;letter-spacing:.04em}
      .conn{stroke:#94a3b8;stroke-width:2.2;fill:none}
      .div{stroke:#c3ccd6;stroke-width:3}
    </style>
  </defs>

  <rect width="980" height="680" fill="#f8fafc"/>

  <!-- 1. All-in-one -->
  <text x="40" y="50" class="title">All-in-one</text>
  <rect x="182" y="36" width="196" height="24" rx="7" fill="#eef2ff"/>
  <text x="194" y="53" class="chip">--profile all-in-one</text>
  <g transform="translate(0,74)">
    <use href="#ico-user" x="46" y="16" width="26" height="26"/>
    <text x="59" y="58" text-anchor="middle" class="usr">Users</text>
    <line class="conn" x1="98" y1="40" x2="180" y2="40" marker-end="url(#arw)"/>
    <rect x="196" y="4" width="378" height="76" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
    <rect x="196" y="4" width="6" height="76" rx="3" fill="#2563eb"/>
    <use href="#ico-pc"  x="222" y="30" width="24" height="24"/>
    <use href="#ico-gpu" x="250" y="30" width="24" height="24"/>
    <text x="292" y="37" class="nt">GPU host</text>
    <text x="292" y="58" class="ns">Web UI · scheduler · in-process GPU inference</text>
  </g>

  <line class="div" x1="40" y1="198" x2="940" y2="198"/>

  <!-- 2. Web front + GPU worker -->
  <text x="40" y="248" class="title">Web front + GPU worker</text>
  <rect x="358" y="234" width="212" height="24" rx="7" fill="#eef2ff"/>
  <text x="370" y="251" class="chip">--profile web / scheduler</text>
  <g transform="translate(0,272)">
    <use href="#ico-user" x="46" y="16" width="26" height="26"/>
    <text x="59" y="58" text-anchor="middle" class="usr">Users</text>
    <line class="conn" x1="98" y1="40" x2="180" y2="40" marker-end="url(#arw)"/>
    <!-- web front -->
    <rect x="196" y="4" width="250" height="76" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
    <rect x="196" y="4" width="6" height="76" rx="3" fill="#64748b"/>
    <use href="#ico-pc" x="222" y="30" width="24" height="24"/>
    <text x="262" y="37" class="nt">Web front (CPU)</text>
    <text x="262" y="58" class="ns">serves the UI · web</text>
    <!-- gpu worker -->
    <rect x="574" y="4" width="290" height="76" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
    <rect x="574" y="4" width="6" height="76" rx="3" fill="#2563eb"/>
    <use href="#ico-pc"  x="600" y="30" width="24" height="24"/>
    <use href="#ico-gpu" x="628" y="30" width="24" height="24"/>
    <text x="670" y="37" class="nt">GPU worker</text>
    <text x="670" y="58" class="ns">runs the pipeline · scheduler</text>
    <!-- to DB -->
    <path class="conn" d="M321,80 V116" marker-end="url(#arw)"/>
    <path class="conn" d="M719,80 V116" marker-end="url(#arw)"/>
  </g>

  <!-- DB cylinder -->
  <g transform="translate(0,390)">
    <path d="M300,12 a220,15 0 0 1 440,0 v34 a220,15 0 0 1 -440,0 z" fill="#eef2ff" stroke="#c7d2fe"/>
    <ellipse cx="520" cy="12" rx="220" ry="15" fill="#f5f7ff" stroke="#c7d2fe"/>
    <text x="520" y="18" text-anchor="middle" class="nt" fill="#3730a3">PostgreSQL</text>
    <text x="520" y="41" text-anchor="middle" class="ns">jobs + files replicated through the DB · sha256-verified</text>
  </g>

  <line class="div" x1="40" y1="486" x2="940" y2="486"/>

  <!-- 3. Remote inference node -->
  <text x="40" y="536" class="title">Remote inference node</text>
  <rect x="354" y="522" width="196" height="24" rx="7" fill="#eef2ff"/>
  <text x="366" y="539" class="chip">--profile resource-node</text>
  <g transform="translate(0,560)">
    <use href="#ico-user" x="46" y="16" width="26" height="26"/>
    <text x="59" y="58" text-anchor="middle" class="usr">Users</text>
    <line class="conn" x1="98" y1="40" x2="180" y2="40" marker-end="url(#arw)"/>
    <rect x="196" y="4" width="250" height="76" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
    <rect x="196" y="4" width="6" height="76" rx="3" fill="#64748b"/>
    <use href="#ico-pc" x="222" y="30" width="24" height="24"/>
    <text x="262" y="37" class="nt">Web + scheduler</text>
    <text x="262" y="58" class="ns">pipeline + database</text>
    <text x="493" y="32" text-anchor="middle" class="lbl">HTTP</text>
    <line class="conn" x1="450" y1="42" x2="534" y2="42" marker-end="url(#arw)"/>
    <rect x="548" y="4" width="360" height="76" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
    <rect x="548" y="4" width="6" height="76" rx="3" fill="#2563eb"/>
    <use href="#ico-pc"  x="574" y="30" width="24" height="24"/>
    <use href="#ico-gpu" x="602" y="30" width="24" height="24"/>
    <text x="644" y="37" class="nt">GPU resource node</text>
    <text x="644" y="58" class="ns">STT · diarization · embeddings · no app DB</text>
  </g>
</svg>
