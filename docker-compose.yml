# Déploiement TranscrIA conteneurisé (P5) — profils web + scheduler + migrate + PostgreSQL.
#
# Le rôle resource-node (GPU) n'est PAS ici : c'est une image/un hôte GPU séparé
# (cf. docs/DOCKER.md). La LLM d'arbitrage et les moteurs STT sont des services externes.
#
# Démarrage (choisir UN profil — db/migrate démarrent dans les deux) :
#     docker compose --profile split up -d     # web + scheduler (CPU/distribué)
#     docker compose --profile gpu   up -d     # all-in-one (GPU, un seul conteneur)
#   1. `db` démarre et devient « healthy » ;
#   2. `migrate` (one-shot) applique `alembic upgrade head` puis se termine ;
#   3. les services du profil démarrent une fois la migration réussie.
# Un `docker compose up -d` sans profil ne démarre que db + migrate (pas de service applicatif).
#
# Secrets / config : `config.yaml` et `.env` sont fournis par volumes (jamais bakés dans
# l'image). Le DSN PostgreSQL est injecté par TRANSCRIA_DATABASE_URL (pointant sur `db`).

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  # Épinglable pour un rollback : TRANSCRIA_IMAGE=transcria:<tag> docker compose up -d
  image: ${TRANSCRIA_IMAGE:-transcria:latest}
  environment: &app-env
    TRANSCRIA_CONFIG: /app/config.yaml
    TRANSCRIA_DATABASE_URL: postgresql+psycopg://transcria:${POSTGRES_PASSWORD:?définir POSTGRES_PASSWORD}@db:5432/transcria
  volumes:
    - ./config.yaml:/app/config.yaml:ro
    - ./.env:/app/.env:ro
  depends_on:
    db:
      condition: service_healthy
  restart: unless-stopped

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: transcria
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?définir POSTGRES_PASSWORD}
      POSTGRES_DB: transcria
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcria -d transcria"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Job one-shot : applique les migrations Alembic, puis se termine (topologie split,
  # image CPU). L'all-in-one GPU utilise `migrate-gpu` (même image GPU) pour ne pas
  # imposer au testeur GPU un 2e build/pull de l'image CPU.
  migrate:
    <<: *app
    profiles: ["split"]
    command: ["migrate"]
    restart: "no"

  # Migration pour la topologie all-in-one GPU : réutilise l'image GPU (transcria-allinone)
  # plutôt que l'image CPU, pour un seul build/pull côté testeur. Hors profil gpu, inactif.
  migrate-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.allinone-gpu
    image: ${TRANSCRIA_ALLINONE_IMAGE:-transcria-allinone:latest}
    command: ["migrate"]
    restart: "no"
    environment:
      <<: *app-env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy

  # Topologie split (web + scheduler) sous le profil `split` pour ne JAMAIS coexister
  # avec `all-in-one` (profil `gpu`) — les deux publient :7870. `db`/`migrate` restent
  # hors profil (toujours démarrés). `docker compose --profile split up`.
  web:
    <<: *app
    profiles: ["split"]
    command: ["web"]
    environment:
      <<: *app-env
      TRANSCRIA_ROLE: web
      TRANSCRIA_BIND: 0.0.0.0:7870
      TRANSCRIA_WORKERS: "4"
    # web reçoit les uploads et sert les téléchargements → il DOIT partager le magasin
    # de jobs avec le scheduler. Volume nommé partagé (mono-hôte) ⇒ storage.shared_backend
    # 'fs' suffit ; pour un split multi-HÔTES, passer 'pg' (cf. STOCKAGE_PARTAGE_JOBS.md).
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro
      - jobs:/app/jobs
      - models:/app/models
    ports:
      - "7870:7870"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  scheduler:
    <<: *app
    profiles: ["split"]
    command: ["scheduler"]
    environment:
      <<: *app-env
      TRANSCRIA_ROLE: scheduler
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro
      - jobs:/app/jobs
      - models:/app/models
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Tout-en-un GPU : un seul conteneur (UI + scheduler + inférence GPU in-process + LLM
  # d'arbitrage embarquée). Profil opt-in `gpu` → `docker compose --profile gpu up`.
  # Image GPU dédiée (CUDA 12.6, llama.cpp compilé, NeMo/Sortformer) construite via
  # Dockerfile.allinone-gpu — voir scripts/docker_quickstart.sh (build/pull + modèles).
  # Accès GPU via CDI (nvidia-ctk cdi generate). Cache modèles monté dans /hf.
  all-in-one:
    <<: *app
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.allinone-gpu
    image: ${TRANSCRIA_ALLINONE_IMAGE:-transcria-allinone:latest}
    command: ["all"]
    environment:
      <<: *app-env
      TRANSCRIA_ROLE: all
      TRANSCRIA_BIND: 0.0.0.0:7870
      # Modèles STT/diarisation chargés depuis le cache HF monté (HF_HOME=/hf).
      HF_HOME: /hf
      # Cohere ASR est un modèle GATED : fournir HF_TOKEN (accepter ses conditions sur
      # huggingface.co) ET laisser l'accès réseau (offline=0) pour la 1re résolution.
      # Pour un test SANS token : models.stt_backend: "whisper" dans config.yaml.
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_OFFLINE: "0"
      TRANSFORMERS_OFFLINE: "0"
      # LLM d'arbitrage embarquée : palier (défaut 12 Go = Qwen3.5-9B Q5_K_M, non gated). Le GGUF
      # est téléchargé dans MODELS_DIR (volume `models`, persistant) par l'entrypoint/quickstart ;
      # l'entrypoint en déduit aussi TRANSCRIA_ARBITRAGE_SCRIPT (profil de palier paramétrique).
      TRANSCRIA_LLM_TIER: ${TRANSCRIA_LLM_TIER:-12}
      MODELS_DIR: /app/models
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro
      - jobs:/app/jobs
      - models:/app/models
      # Cache HF. Source paramétrable :
      #   * SLIM (défaut) → bind du cache HÔTE (modèles téléchargés au runtime, réutilisables) ;
      #   * BUNDLED → volume nommé `hfcache` (TRANSCRIA_HF_SOURCE=hfcache, posé par le quickstart)
      #     SEEDÉ depuis l'image (modèles bakés) au 1er `up` → zéro-download, pas de cache hôte
      #     (supprime le piège « File exists » des symlinks du cache hôte).
      - ${TRANSCRIA_HF_SOURCE:-${HF_CACHE_DIR:-~/.cache/huggingface}}:/hf
    ports:
      - "7870:7870"
    # Réservation GPU par CDI (Docker ≥ 25). `all` = tous les GPU ; restreindre via
    # device_ids: ["nvidia.com/gpu=0"] pour n'en exposer qu'un.
    devices:
      - "nvidia.com/gpu=all"
    depends_on:
      db:
        condition: service_healthy
      migrate-gpu:
        condition: service_completed_successfully

volumes:
  pgdata:
  jobs:
  models:
  # Cache HF du mode BUNDLED (image à modèles embarqués) : seedé depuis l'image au 1er `up`
  # quand TRANSCRIA_HF_SOURCE=hfcache. Inutilisé en mode slim (bind du cache hôte).
  hfcache:
